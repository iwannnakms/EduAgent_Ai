services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edu-ai-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
      VECTOR_BACKEND: chroma_http
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      - redis
      - chroma

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edu-ai-worker
    command: celery -A worker.celery_app worker -l info
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
      VECTOR_BACKEND: chroma_http
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    volumes:
      - ./:/app
    depends_on:
      - redis
      - chroma

  frontend:
    image: node:20-alpine
    container_name: edu-ai-frontend
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    container_name: edu-ai-redis
    ports:
      - "6379:6379"

  chroma:
    image: chromadb/chroma:latest
    container_name: edu-ai-chroma
    ports:
      - "8001:8000"
    volumes:
      - ./data/chroma-server:/chroma/chroma
